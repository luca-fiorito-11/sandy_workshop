name: Run Sampling Notebooks (Devcontainer + Papermill)

on:
  workflow_dispatch:
  push:
    paths:
      - 'Exercises/CASE1/u234_samples/**'
      - 'Exercises/CASE1/godiva/**'
      - '.github/workflows/run-sampling.yml'

jobs:
  run-notebooks:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Pull Devcontainer Image
      run: |
        docker pull ghcr.io/${{ github.repository_owner }}/$(basename ${{ github.repository }}):devcontainer

    - name: Run Papermill + Godiva script inside Devcontainer
      run: |
        docker run --rm \
          -u root \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          ghcr.io/luca-fiorito-11/sandy_workshop:devcontainer \
          bash -e -o pipefail -c "
            cd Exercises/CASE1/u234_samples && \
            bash get_samples.sh && \
            bash get_h5file.sh && \
            papermill xs_samples_analysis.ipynb xs_samples_analysis_executed.ipynb --log-output && \
            cd ../godiva && \
            bash run_samples_godiva.sh
          "

    - name: Upload executed notebooks
      uses: actions/upload-artifact@v4
      with:
        name: executed-notebooks
        path: |
          Exercises/CASE1/u234_samples/run_sampling_sequence_executed.ipynb
          Exercises/CASE1/u234_samples/xs_samples_analysis_executed.ipynb
